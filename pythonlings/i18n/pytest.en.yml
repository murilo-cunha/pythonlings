en:
  pytest1: |
    The bug is in `is_palindrome`: `s == s` always returns True (identity, not reversal).
    Fix: `return s == s[::-1]`  — `[::-1]` reverses the string.
  pytest2: |
    return {"name": "Alice", "scores": [80, 90, 100], "active": True}
    Any three scores that sum to 270 work.
  pytest3: |
    Fix the function: `return c * 9 / 5 + 32`
    Fix expected values: (0, 32), (100, 212), (-40, -40)
  pytest4: |
    Add `monkeypatch.setenv("GREETING", "Hi")` as the first line of test_custom_greeting.
    The monkeypatch parameter is already declared — just call .setenv on it.
  pytest5: |
    test_zero_division: wrap the call — `with pytest.raises(ZeroDivisionError): divide(1, 0)`
    test_parse_invalid: add `match="not positive"` — `pytest.raises(ValueError, match="not positive")`
