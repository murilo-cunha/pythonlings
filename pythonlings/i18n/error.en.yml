en:
  error_handling1: |
    def safe_divide(a, b):
        try:
            result = a / b
        except ZeroDivisionError:
            return None
        else:
            return result
        finally:
            pass  # optional cleanup
  error_handling2: |
    def __init__(self, field, message):
        super().__init__(message)
        self.field = field
        self.message = message
  error_handling3: |
    Change: raise DatabaseError("User not found")
    To:     raise DatabaseError("User not found") from e
    The "from e" links the exceptions so __cause__ is set.
  error_handling4: |
    Change: raise Exception("validation errors")
    To:     raise ExceptionGroup("validation errors", errors)
    ExceptionGroup is a built-in (Python 3.11+) — no import needed.
