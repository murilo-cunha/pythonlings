en:
  abstract_classes1: |
    Rectangle.area: return self.width * self.height
    Rectangle.perimeter: return 2 * (self.width + self.height)
  abstract_classes2: |
    Cat.sound property: return "meow"
    Dog.sound property: return "woof"
    The @property decorator must be present on the concrete implementation too.
  abstract_classes3: |
    Square.draw: return f"Square(s={self.side})"
    The Circle implementation is already correct — use it as a reference.
  abstract_classes4: |
    CsvRow.serialize: return ",".join(str(v) for v in self.values)
    CsvRow satisfies Serializable (Protocol) structurally — no inheritance needed.
