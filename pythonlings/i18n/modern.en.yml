en:
  modern_python1: |
    formatted: f"{value:.2f}"       (2 decimal places)
    padded:    f"{name:->10}"       (right-align, fill with -)
    count:     f"{len(items)} items"  (expression inside {})
  modern_python2: |
    whole_roots = [root for n in numbers if (root := math.isqrt(n)) ** 2 == n]
    The walrus operator assigns math.isqrt(n) to root and returns it in one step.
  modern_python3: |
    match code:
        case 200: return "OK"
        case 404: return "Not Found"
        case 500: return "Internal Server Error"
        case _:   return "Unknown"
  modern_python4: |
    match n:
        case n if n < 0:  return "negative"
        case 0:           return "zero"
        case n if n < 10: return "small positive"
        case _:           return "large positive"
  modern_python5: |
    match shape:
        case Point(x=x, y=y): return f"point at ({x}, {y})"
        case Circle(center=Point(x=cx, y=cy), radius=r): return f"circle at ({cx}, {cy}) r={r}"
        case Rectangle(top_left=Point(x=x1,y=y1), bottom_right=Point(x=x2,y=y2)):
            return f"rect from ({x1}, {y1}) to ({x2}, {y2})"
        case _: return "unknown shape"
