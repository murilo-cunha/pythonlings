en:
  data_structures1: |
    Start with [0, "hello", True, ["other list"]]. You need to:
    set index 0 to 1, change index 1 to "world", and change index 2 to False.
    Use my_list[idx] = value. Keep all four elements — do not pop.
  data_structures2: |
    prices["banana"] = 0.79 updates the price.
    del prices["cherry"] removes the key.
    prices.get("mango", 0.0) returns 0.0 when "mango" is absent.
  data_structures3: |
    evens_only = evens - primes  (difference)
    both = evens & primes        (intersection)
    all_nums = evens | primes    (union)
  data_structures4: |
    first, *rest = numbers assigns numbers[0] to first and numbers[1:] to rest.
    first2, *middle, last = numbers captures head, middle slice, and tail.
    Replace the None assignments with a single starred unpacking statement each.
