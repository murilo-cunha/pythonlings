en:
  stdlib1: |
    pathlib.Path provides an OO interface to filesystem paths.
    Use / to join paths: base / "sub" / "file.txt"
    Key methods: .mkdir(), .read_text(), .write_text(), .exists(), .is_dir(), .suffix, .stem.
  stdlib2: |
    Always use timezone-aware datetimes in production to avoid ambiguity.
    datetime(2024, 1, 1, tzinfo=timezone.utc) creates a UTC datetime.
    Arithmetic with timedelta: dt + timedelta(hours=2, minutes=30).
  stdlib3: |
    Counter(iterable) counts occurrences. .most_common(n) returns top-n pairs.
    defaultdict(list) auto-creates a list for missing keys — no KeyError on first append.
    deque(maxlen=n) is a fixed-size sliding window — oldest items are auto-discarded.
  stdlib4: |
    json.dumps(obj) → JSON string. json.loads(s) → Python object.
    Add indent=2 for human-readable output.
    Python True/False/None become JSON true/false/null automatically.
  stdlib5: |
    re.findall(pattern, text) returns all non-overlapping matches.
    re.sub(pattern, repl, text) replaces matches with repl.
    Use groups (...) with re.search(...).group(1) to extract parts of a match.
  stdlib6: |
    logging.getLogger(name) returns (or creates) a named logger.
    Set logger.setLevel(logging.DEBUG) to emit debug messages.
    Attach handlers to control where output goes: StreamHandler, FileHandler, etc.
    The root logger's level is WARNING by default — child loggers inherit it unless explicitly set.
