en:
  pydantic1: |
    Add three fields inside the class body, then remove `pass`:
        name: str
        age: int
        email: str
  pydantic2: |
    name: str = Field(min_length=1)
    price: float = Field(gt=0)
    quantity: int = Field(ge=0, default=0)
  pydantic3: |
    username_must_be_lowercase:
        if not v.islower(): raise ValueError("must be lowercase")
        return v
    email_must_contain_at:
        if "@" not in v: raise ValueError("invalid email")
        return v
  pydantic4: |
    Change `address: dict` to `address: Address`
    Pydantic coerces the plain dict to an Address instance automatically.
  pydantic5: |
    d = c.model_dump()
    c2 = Config.model_validate({"host": "0.0.0.0", "port": 443, "debug": True})
