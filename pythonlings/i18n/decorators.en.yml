en:
  decorators1: |
    In the wrapper, call func(*args, **kwargs) and uppercase the result:
    return func(*args, **kwargs).upper()
  decorators2: |
    Add @functools.wraps(func) on the line immediately above def wrapper.
    It copies __name__, __doc__, and other attrs from func to wrapper.
  decorators3: |
    In wrapper: for _ in range(n): result = func(*args, **kwargs); return result
    The loop calls func n times, and we return the last result.
  decorators4: |
    In the setter: if value < 0: raise ValueError("radius must be non-negative")
    In area: return math.pi * self._radius ** 2
  decorators5: |
    @italic @bold means italic wraps bold. Change to @bold @italic so bold wraps italic.
    The outermost decorator is applied last — it controls the outer HTML tag.
