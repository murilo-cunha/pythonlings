en:
  comprehensions1: |
    [n**2 for n in numbers if n % 2 == 0]
    The condition filters first (n % 2 == 0), then the expression squares (n**2).
  comprehensions2: |
    {w: len(w) for w in words}
    Replace the value expression (currently 0) with len(w).
  comprehensions3: |
    {word[0] for word in sentence.split()}
    Replace the expression (currently the whole word) with word[0].
  comprehensions4: |
    Change [n ** 3 for n in numbers] to (n ** 3 for n in numbers).
    Round brackets () create a generator; square brackets [] create a list.
  comprehensions5: |
    [matrix[i][j] for i in range(3) for j in range(3)]
    Add the inner loop: for j in range(3). Then use matrix[i][j] as the expression.
