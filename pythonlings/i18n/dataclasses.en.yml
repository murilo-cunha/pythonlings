en:
  dataclasses1: |
    Add three field declarations inside the class body:
        name: str
        price: float
        in_stock: bool = True
    Fields with defaults (in_stock) must come after fields without defaults.
  dataclasses2: |
    In add_track: self.tracks.append(track)
    The field(default_factory=list) is already correct — it ensures each Playlist
    gets its own list rather than sharing one list across all instances.
  dataclasses3: |
    Change @dataclass to @dataclass(frozen=True).
    That single keyword makes all fields read-only and enables hashing.
  dataclasses4: |
    In __post_init__:
        self.value = max(self.minimum, min(self.maximum, self.value))
    This clamps value to [minimum, maximum] in one expression.
  dataclasses5: |
    Add one field declaration inside ElectricVehicle:
        battery_kwh: float
    Parent fields (make, model, year) are inherited automatically.
