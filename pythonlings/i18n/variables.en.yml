en:
  variables1: |
    Each type has a specific literal syntax: 1 (int), 1.0 (float), "text" (str),
    b"data" (bytes), True/False (bool), (1, 2) (tuple).
    Assign the correct literal to each variable — the types must match exactly.
  variables2: |
    To get an int write 1 (no dot). For float write 1.0 (with dot).
    For bytes write b"Hello" (b prefix). Change the right-hand side of each assignment.
  variables3: |
    x = y = z = value assigns value to all three in one statement.
    a, b, c = "a", "b", "c" unpacks a tuple. Both are already correct here —
    just remove the # I AM NOT DONE comment.
  variables4: |
    one + two fails because int + str is a TypeError.
    Fix it by converting "2" to int first: int(two), or compute 1 + 2 directly.
  variables5: |
    Strings are immutable — hello_immutable_string[0] = "H" raises TypeError.
    Remove that line. The list assignment hello_mutable_list[0] = "I WORK" is fine.
