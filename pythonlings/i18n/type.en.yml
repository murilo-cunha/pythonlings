en:
  type_hints1: |
    def add(a: int, b: int) -> int: ...
    def greet(name: str) -> str: ...
    Annotations are just expressions assigned to __annotations__ — int and str, not strings.
  type_hints2: |
    def double(value: int | float) -> int | float: ...
    def parse_id(raw: str) -> int | None: ...
    Use the | operator (Python 3.10+), not Union[] from typing.
  type_hints3: |
    def first(items: list[T]) -> T: ...
    T is the TypeVar defined above. The annotation tells checkers: input list element type = return type.
  type_hints4: |
    class Movie(TypedDict):
        title: str
        year: int
        rating: float
    Each line is a TypedDict field declaration — same syntax as a dataclass but produces a dict subtype.
  type_hints5: |
    class Point(NamedTuple):
        x: float
        y: float
    Two field declarations are all that's needed — NamedTuple generates __init__ and __new__ automatically.
