en:
  functional1: |
    squares:      list(map(lambda n: n**2, numbers))
    evens:        list(filter(lambda n: n % 2 == 0, numbers))
    even_squares: list(map(lambda n: n**2, filter(lambda n: n % 2 == 0, numbers)))
  functional2: |
    product: reduce(lambda a, b: a * b, numbers)
    maximum: reduce(lambda a, b: a if a > b else b, numbers)
  functional3: |
    Add @lru_cache() on the line immediately above def fib.
    The parentheses () are required — it's @lru_cache(), not @lru_cache.
  functional4: |
    square     = partial(power, exponent=2)
    cube       = partial(power, exponent=3)
    format_2dp = partial(format_number, decimals=2)
  functional5: |
    combined  = list(itertools.chain([1,2,3], [4,5,6]))
    grouped   = [(k, list(v)) for k, v in itertools.groupby(data)]
    first_five = list(itertools.islice(itertools.count(1), 5))
