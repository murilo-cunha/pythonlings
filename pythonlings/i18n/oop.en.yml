en:
  oop1: |
    __repr__: return f"Point({self.x}, {self.y})"
    __str__: return f"({self.x}, {self.y})"
    f-strings use __str__; repr() and the REPL use __repr__.
  oop2: |
    __eq__: return self.r == other.r and self.g == other.g and self.b == other.b
    __hash__: return hash((self.r, self.g, self.b))
    Always define both together — Python unhashes a class if you add __eq__ without __hash__.
  oop3: |
    In Dog.__init__: super().__init__(name) then self.breed = breed.
    In Dog.speak: return super().speak() + " — Woof!"
  oop4: |
    from_fahrenheit: return cls((f - 32) * 5 / 9)
    is_freezing: return celsius <= 0
  oop5: |
    Add __slots__ = ("x", "y") as a class variable, before __init__.
    This is a class-level declaration, not an instance attribute.
