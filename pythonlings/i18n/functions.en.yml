en:
  functions1: |
    The function hard-codes "Hello" instead of using the greeting parameter.
    Change the f-string to use greeting instead: f"{greeting}, {name}!"
  functions2: |
    total: return sum(args). describe: return kwargs directly (it's already a dict).
  functions3: |
    Inside multiply, use factor (the captured variable): return x * factor
    factor comes from the enclosing make_multiplier scope — Python keeps it alive.
  functions4: |
    square: lambda x: x**2.  is_even: lambda x: x % 2 == 0.
    second: lambda t: t[1]  (returns the second element of the tuple).
  functions5: |
    Use math.sqrt(a**2 + b**2) or math.hypot(a, b).
    The / in the signature makes a and b positional-only — don't remove it.
